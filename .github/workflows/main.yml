name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Show repo structure
        run: find . -maxdepth 3 -name "*.gradle" -o -name "settings.gradle"

      - name: Install Gradle and generate wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          unzip -q gradle-8.1.1-bin.zip
          cd progresswidget
          ../gradle-8.1.1/bin/gradle wrapper
          chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > progresswidget/local.properties

      - name: Build debug APK
        run: |
          cd progresswidget
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProgressWidget-debug
          path: progresswidget/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
